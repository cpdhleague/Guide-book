name: Convert Content Issue to Post

on:
  issues:
    types: [opened]

jobs:
  build:
    if: >-
      startsWith(github.event.issue.title, 'YouTube:') ||
      startsWith(github.event.issue.title, 'Spotify:') ||
      startsWith(github.event.issue.title, 'Article:') ||
      startsWith(github.event.issue.title, 'PDHpod:') ||
      startsWith(github.event.issue.title, 'Jalapenos:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run generation script
        id: generate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python _scripts/youtube_to_post.py

      - name: Report failure to issue
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ❌ **Automated processing failed.**

            This can happen if:
            - No valid YouTube or Spotify URL was found in the issue body
            - The link format was not recognised
            - There was a temporary network issue

            Please check the [Actions tab](/${{ github.repository }}/actions) for the full error log.

      # ----------------------------------------------------------
      # AUTO-PUBLISH: gnews is false → commit directly to master
      # Article goes live immediately, no review needed.
      # ----------------------------------------------------------
      - name: Publish directly to master
        if: steps.generate.outputs.gnews != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/images/
          git diff --staged --quiet || git commit -m "Publish: ${{ github.event.issue.title }}"
          git push origin master

      # ----------------------------------------------------------
      # GNEWS REVIEW: gnews is true → create PR for Patrik to approve
      # Article only goes live once Patrik merges the PR.
      # ----------------------------------------------------------
      - name: Create PR for GNews review
        if: steps.generate.outputs.gnews == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Submission (GNews review): ${{ github.event.issue.title }}"
          title: "GNews Review Required: ${{ github.event.issue.title }}"
          body: |
            📰 This submission has been flagged for **Google News**.

            Before merging, please check:
            - [ ] The article body is substantial enough for Google News (not just short show notes)
            - [ ] Title and excerpt are clear and informative
            - [ ] No formatting issues
            - [ ] `gnews: true` is set correctly in the front matter

            Merge to publish and include in the Google News RSS feed.

            _From issue #${{ github.event.issue.number }}_
          branch: "gnews-review-${{ github.event.issue.number }}"
          base: master
          labels: gnews, needs-review

      - name: Close Issue
        if: success()
        uses: peter-evans/close-issue@v3
        with:
          comment: |
            ✅ Processed successfully!
            ${{ steps.generate.outputs.gnews == 'true' && 'A Pull Request has been created for GNews review — Patrik will merge it once approved.' || 'Article published directly to the site.' }}
