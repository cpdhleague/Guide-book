# Author profiles for CPDH.guide
# Keys must exactly match the "author:" field in post front matter.
# Use all-lowercase, no spaces (e.g. gingerpersolus, beachbodgod69)
# To add a photo: drop image in assets/images/authors/ and reference it here.

ginger:
  name: "Ginger Persolus"
  photo: "/assets/images/ginger-bio.jpg"
