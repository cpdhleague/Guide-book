# Author profiles for CPDH.guide
# Keys must exactly match the "author:" field in post front matter.
# Use all-lowercase, no spaces (e.g. gingerpersolus, beachbodgod69)
# To add a photo: drop image in assets/images/authors/ and reference it here.

ginger:
  name: "Ginger Persolus"
  photo: "/assets/images/ginger-bio.jpg"
  bio: "Currently living the life a of digital nomad, Ginger is co-owner of CPDH.guide and an incredible enthusiast of the format. He is proud of the fact that he has the most PDH matches on record. 
    watch his play videos online or ask him questions on the CPDH.guide Discord."
  links:
    - label: "Discord"
      url: "https://discord.com/invite/UtgN272kpq"
    - label: "YouTube"
      url: "https://www.youtube.com/@cPDH"

beachbodgod69:
  name: "BeachBodGod69"
  photo: "/assets/images/authors/beachbodgod69.jpg"
  bio: "An avid cPDH meta enjoyer and true believer in the power of Mystic Enforcer."
  links:
    - label: "Discord"
      url: "https://discord.com/invite/UtgN272kpq"

pdhpod:
  name: "The PDH Pod"
  photo: "/assets/images/authors/pdhpod.jpg"
  bio: "The PDH Pod is hosted by three lifelong Magic players dedicated to competitive Pauper Commander. Tune in for weekly strategy, meta breakdowns, and deep dives into the cPDH format."
  links:
    - label: "Spotify"
      url: "https://open.spotify.com/show/YOUR_SHOW_ID_HERE"
    - label: "Discord"
      url: "https://discord.com/invite/UtgN272kpq"

